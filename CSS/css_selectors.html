<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         

         div p{
            color: blue;
         }

         ol > li{
            list-style-type: none;
         }

         h1+p{
            color: brown;
         }
         div+p{
            color: brown;
         }

         h1~p{
            color: aquamarine;
         }
         p::first-line{
            columns: yellow !important;
         }

        button:hover{
            color: rgb(202, 227, 127);
        }

        li:nth-child(odd){
            color: rgb(18, 128, 224);
        }
        li:nth-child(even){
            color: rgb(64, 232, 179);
        }
        button:active{
            background-color: aqua;
        }
    </style>
</head>
<body>
    <h1>This is a heading </h1>
    <p>This is Paragraph <br>
        this is secon dline
    </p>
    <ol>
        <li>List Item 1</li>
        <li>List Item 2
        </li>
        <li>List Item 3</li>
    </ol>
    <div>
        <p>
          This is a paragraph 2
        </p>
    </div>
    <p>This is paragraph 3</p>
     <label for="fistname"></label>
    <input type="text" name="firstname" id="firstname">

    <button id="button">Click Me</button>
</body>
</html>
