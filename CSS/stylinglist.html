<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .item{
            list-style-type:decimal ; 
            font-weight: bold;
            font-style: italic;

        }
        #items{
            list-style-type: disc;
            color: rgb(153, 225, 225);
            text-transform: lowercase;
            
        }
        li{
            margin: 8px 0;
        }
        .last{
            list-style-type: none;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            text-decoration: underline;
            line-height: 2.5;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h2>Unordered list example</h2>
    <ul class="item">
        <li>List Type 1</li>
        <li>List Type 2</li>
        <li>List Type 3</li>
    </ul>
     <h2>Ordered List Example</h2>
    <ol id="items">
        <li>List Item 1</li>
        <li>List Item 2</li>
        <li>List Item 3</li>
    </ol>
    <ul class="last">
        <li>Last List </li>
        <li> Last List</li>
        <li>Last List</li>
    </ul>
</body>
</html>
