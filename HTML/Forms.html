<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <fieldset>
            <legend>Personal Information</legend>

            <label for="firstnameid">First Name:</label>
            <input type="text" id="firstnameid" name="firstname" placeholder="First Name"><br>

            <label for="lastnameid">Last Name:</label>
            <input type="text" id="lastnameid" name="lastname" placeholder="Lastname">

            <label for="resumeid">Upload Resume:</label>
            <input type="file" id="resumeid" name="resume" placeholder="Resume"><br>

            <label for="passwordid">Password:</label>
            <input type="password" id="passwordid" placeholder="password">


            <label for="checkboxid">Agree to terms and conditions:</label>
            <input type="checkbox" id="checkboxid"><br>

            <label for="dateofbirthid">Date of Birth:</label>
            <input type="date" name="dateofbirth" id="dateofbirthid"><br>

            <label for="colorid">Color:</label>
            <input type="color" name="color" id="colorid">


            <label for="languageid">Preferred Language:</label>
            <select name="courses" id="languageid">
                <optgroup>
                    <option value="java">Java</option>
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                </optgroup>
            </select>

            <textarea cols="30" rows="20"></textarea>

            <label for="submitid">Submit:</label>
            <input type="submit" id="submitid" name="submit">

        </fieldset>


    </form>

</body>

</html>
