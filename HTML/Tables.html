<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
      tr,th,td{
        border: 2px solid rebeccapurple;
      }
      table{
        border-collapse: collapse;
      }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>S.No</th>
                <th>Name</th>
                <th>Course</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Jhonny</td>
                <td rowspan="2">MCA</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Suresh</td>
                <!-- <td>MCA</td> -->
            </tr>
            <tr>
                <td>3</td>
                <td>Teju</td>
                <td>MSC</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
